services:
  net-toolkit-stats:
    build: .
    container_name: net-toolkit-stats
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./data:/app/data
    networks:
      - default
      - china-travel-guide_default
    environment:
      - PORT=3000
      - BASE_PATH=/nettoolkit-stats
      - JWT_SECRET=${JWT_SECRET:?必须设置 JWT_SECRET 环境变量}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?必须设置 ADMIN_PASSWORD 环境变量}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/nettoolkit-stats/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  china-travel-guide_default:
    external: true
